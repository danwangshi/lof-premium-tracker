user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # IP访问频率限制 - 每秒最多5个请求，突发10个请求
    limit_req_zone $binary_remote_addr zone=rate_limit:10m rate=5r/s;
    
    # IP每日访问次数限制 - 每天最多约10080次请求（7r/m = 7*60*24 = 10080）
    limit_req_zone $binary_remote_addr zone=day_limit:10m rate=7r/m;
    
    # IP连接数限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # 定义请求过快时返回的页面
    error_page 429 /rate_limit.html;

    # 上游服务器
    upstream flask_app {
        server app:5000;
    }

    # HTTP 服务器配置
    server {
        listen 80;
        server_name _;

        # 访问时间限制（北京时间）：6点到凌晨1点（01:00-06:00 禁止访问）
        # 使用 $time_local 变量，格式为 "dd/MMM/yyyy:HH:mm:ss +0800"
        if ($time_local ~* ":0[1-5]:") {
            return 503;
        }

        # 请求过快返回页面
        location = /rate_limit.html {
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>请求过快</title><style>body{text-align:center;margin-top:100px;font-family:Arial,sans-serif;}</style></head><body><h1>请求过快</h1><p>您的访问过于频繁，请稍后再试。</p><p>如果问题持续，请联系管理员。</p></body></html>';
        }

        # 维护时间返回页面
        error_page 503 /maintenance.html;
        location = /maintenance.html {
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>维护时间</title><style>body{text-align:center;margin-top:100px;font-family:Arial,sans-serif;}</style></head><body><h1>服务维护中</h1><p>当前时间不在服务时间段内。</p><p>服务时间：6:00 - 01:00</p></body></html>';
        }

        # 所有请求都代理到 Flask 后端（Flask 已集成静态文件服务）
        location / {
            # IP访问频率限制
            limit_req zone=rate_limit burst=10 nodelay;
            limit_req zone=day_limit burst=100 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API 代理
        location /api/ {
            # IP访问频率限制
            limit_req zone=rate_limit burst=10 nodelay;
            limit_req zone=day_limit burst=100 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # 健康检查（不限制访问频率）
        location /health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 其他后端路由
        location /refresh {
            # IP访问频率限制
            limit_req zone=rate_limit burst=5 nodelay;
            limit_req zone=day_limit burst=50 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /init-history {
            # IP访问频率限制
            limit_req zone=rate_limit burst=5 nodelay;
            limit_req zone=day_limit burst=50 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /init-kline-history {
            # IP访问频率限制
            limit_req zone=rate_limit burst=5 nodelay;
            limit_req zone=day_limit burst=50 nodelay;
            
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 静态文件路由（pages, css, js, assets）
        location /pages/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
        }

        location /css/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /js/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /assets/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # HTTPS 服务器配置（可选，需要 SSL 证书）
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # 同样的 location 配置...
    # }
}

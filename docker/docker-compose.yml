version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: lof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lof_funds}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"  # 生产环境建议不暴露数据库端口
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lof-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Flask 应用
  app:
    image: danwangshi/lof-fund-app:latest  # 使用预构建镜像
    container_name: lof-app
    restart: unless-stopped
    environment:
      # Flask 配置
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-300}
      # PostgreSQL 配置
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lof_funds}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres123}
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
      # 企业微信通知配置（可选）
      - WEWORK_ENABLED=${WEWORK_ENABLED:-false}
      - WEWORK_CONFIG=${WEWORK_CONFIG:-}
      - WEWORK_SCHEDULE_ENABLED=${WEWORK_SCHEDULE_ENABLED:-true}
      - WEWORK_SCHEDULE_TIMES=${WEWORK_SCHEDULE_TIMES:-07:00,08:00}
      - WEWORK_PREMIUM_THRESHOLD=${WEWORK_PREMIUM_THRESHOLD:-3.0}
      - WEWORK_DISCOUNT_THRESHOLD=${WEWORK_DISCOUNT_THRESHOLD:-1.5}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 持久化日志
      - app_logs:/app/logs
      # 持久化缓存文件
      - app_cache:/app/backend/cache
    networks:
      - lof-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: lof-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录（可选）
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - lof-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
  app_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  lof-network:
    driver: bridge

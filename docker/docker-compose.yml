version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:latest
    container_name: lof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lof_funds
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lof-network

  # Flask 应用
  app:
    image: lof-fund-app:latest
    container_name: lof-app
    restart: unless-stopped
    environment:
      # Flask 配置
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=false
      - LOG_LEVEL=INFO
      - REFRESH_INTERVAL=300
      # PostgreSQL 配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=lof_funds
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 持久化日志（可选）
      - app_logs:/app/logs
    networks:
      - lof-network

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  lof-network:
    driver: bridge

name: Sync Upstream Main

on:
  schedule:
    # 全天每隔 2 小时运行一次 (UTC 时间)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/MistyBridge/lof-premium-tracker.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          # 尝试合并上游更改。如果有冲突，默认采用上游版本，但不会删除本地新增的文件
          git merge upstream/main --no-edit --strategy-option=theirs || true
          
      - name: Push changes
        run: git push origin main
